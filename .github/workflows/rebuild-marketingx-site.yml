name: Rebuild marketingx-site on plugin push

# Why this exists:
#   marketingx-site embeds the install URL as
#   https://raw.githubusercontent.com/connactai/Salecraft-Plugin/<COMMIT_SHA>/CLAUDE.md
#   The SHA is fetched from the GitHub API at *build time* (see
#   marketingx-site/cloudbuild.yaml) and baked into the JS bundle as
#   NEXT_PUBLIC_PLUGIN_SHA. Plugin pushes don't reach end users until
#   marketingx-site is rebuilt — this workflow closes that gap.
#
# Mechanism:
#   Use a dedicated GCP service account (marketingx-rebuild-trigger@...)
#   to invoke the existing Cloud Build trigger `marketingx-site-on-plugin-push`
#   in project gen-lang-client-0747655769 / region asia-east1.
#
# Why gcloud and not webhook?
#   The trigger uses 2nd-gen GitHub App connection (sourceToBuild +
#   gitFileSource). Direct webhook POST returns 400 INVALID_ARGUMENT
#   regardless of body shape. `gcloud builds triggers run` works
#   reliably and is the supported invocation path for this trigger
#   type. SA key is stored in GitHub Secrets (GCP_SA_KEY).
#
# Secret:
#   GCP_SA_KEY — JSON key for marketingx-rebuild-trigger@gen-lang-client-0747655769.iam.gserviceaccount.com
#   SA has roles/cloudbuild.builds.editor scoped to this project only.

on:
  push:
    branches: [master]
  workflow_dispatch: {}

# Don't queue duplicate rebuilds during rapid pushes — keep only the latest.
concurrency:
  group: marketingx-rebuild
  cancel-in-progress: true

permissions:
  contents: read
  issues: write   # for notify-on-failure to open/update an issue

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Trigger marketingx-site Cloud Build
        run: |
          gcloud builds triggers run marketingx-site-on-plugin-push \
            --region=asia-east1 \
            --project=gen-lang-client-0747655769 \
            --branch=master \
            --format="value(metadata.build.id)" > /tmp/build_id.txt 2>&1 || true

          BUILD_ID=$(cat /tmp/build_id.txt | tail -1)
          echo "Triggered build: $BUILD_ID"

          if [ -z "$BUILD_ID" ] || echo "$BUILD_ID" | grep -qi "error"; then
            echo "::error::Failed to trigger Cloud Build"
            cat /tmp/build_id.txt
            exit 1
          fi

          echo "## marketingx-site rebuild triggered" >> $GITHUB_STEP_SUMMARY
          echo "- Plugin commit: \`${GITHUB_SHA:0:8}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Build ID: \`$BUILD_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "- [Cloud Build console](https://console.cloud.google.com/cloud-build/builds/$BUILD_ID;region=asia-east1?project=gen-lang-client-0747655769)" >> $GITHUB_STEP_SUMMARY

  # Don't depend on per-user GitHub notification settings being correctly
  # configured. If the rebuild trigger fails, open (or bump) a GitHub issue
  # so the failure is visible in-repo. Auto-closes when next push succeeds.
  notify-on-failure:
    needs: trigger-rebuild
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = '[ci] marketingx-site rebuild failing';
            const body = [
              `Rebuild trigger failed for plugin commit \`${context.sha.slice(0,8)}\`.`,
              ``,
              `salecraft.ai will keep serving the **previous** plugin SHA until this is fixed.`,
              ``,
              `**Diagnosis checklist:**`,
              `- Check the failed run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- Verify GitHub secret \`GCP_SA_KEY\` still exists`,
              `- Verify GCP SA \`marketingx-rebuild-trigger@gen-lang-client-0747655769.iam.gserviceaccount.com\` is enabled and has \`roles/cloudbuild.builds.editor\` + \`roles/iam.serviceAccountUser\` on \`876464738390-compute@developer.gserviceaccount.com\``,
              `- Verify Cloud Build trigger \`marketingx-site-on-plugin-push\` (asia-east1) still exists`,
              ``,
              `Manual rebuild while debugging:`,
              `\`\`\`bash`,
              `gcloud builds triggers run marketingx-site-on-plugin-push \\`,
              `  --region=asia-east1 --project=gen-lang-client-0747655769 --branch=master`,
              `\`\`\``,
              ``,
              `Auto-closed when the workflow next succeeds.`,
            ].join('\n');

            // Find existing open issue with this title
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'ci-rebuild-failure',
              state: 'open',
            });

            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `Failure recurred on \`${context.sha.slice(0,8)}\` — [run #${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ci-rebuild-failure'],
              });
            }

  # If this run succeeded, auto-close any open ci-rebuild-failure issue.
  close-resolved-issue:
    needs: trigger-rebuild
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'ci-rebuild-failure',
              state: 'open',
            });
            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Auto-resolved by successful run on \`${context.sha.slice(0,8)}\`.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
