<!-- LP iframe Embed Component -->
<!-- Usage: Embeds the full interactive LP in a responsive iframe. -->
<div class="lp-embed-container">
  <div class="lp-embed lp-iframe-wrap" data-ratio="{{aspect_ratio}}">
    <iframe
      src="{{public_lp_url}}"
      title="{{page_title}}"
      loading="lazy"
      allowfullscreen
      sandbox="allow-scripts allow-same-origin allow-popups allow-forms"
      style="width:100%;height:100%;border:none;"
    ></iframe>
  </div>
</div>
