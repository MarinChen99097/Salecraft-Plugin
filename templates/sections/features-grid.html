<!-- Features Grid Section -->
<div class="features-container">
  <h2 class="section-title">{{i18n.section_features}}</h2>
  <div class="features-grid">
    {{#each features}}
    <div class="feature-card">
      <div class="feature-icon">{{this.icon}}</div>
      <h3>{{this.title}}</h3>
      <p>{{this.description}}</p>
    </div>
    {{/each}}
  </div>

  <!-- Optional: LP stripe as feature visual -->
  {{#if feature_stripe_idx}}
  <div class="feature-visual">
    <div class="lp-embed-container">
      <div class="lp-embed" data-ratio="{{aspect_ratio}}">
        <img
          src="assets/stripe-{{feature_stripe_idx}}.webp"
          alt="{{i18n.section_features}}"
          loading="lazy"
        >
      </div>
    </div>
  </div>
  {{/if}}
</div>
